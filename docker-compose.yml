version: '3.8'

services:
  node1:
    build: .
    container_name: raft-node1
    ports:
      - "50051:50051"
    environment:
      - NODE_ID=node1
      - PORT=50051
      - PEERS=node2:node2:50052,node3:node3:50053,node4:node4:50054,node5:node5:50055
    networks:
      - raft-network

  node2:
    build: .
    container_name: raft-node2
    ports:
      - "50052:50052"
    environment:
      - NODE_ID=node2
      - PORT=50052
      - PEERS=node1:node1:50051,node3:node3:50053,node4:node4:50054,node5:node5:50055
    networks:
      - raft-network

  node3:
    build: .
    container_name: raft-node3
    ports:
      - "50053:50053"
    environment:
      - NODE_ID=node3
      - PORT=50053
      - PEERS=node1:node1:50051,node2:node2:50052,node4:node4:50054,node5:node5:50055
    networks:
      - raft-network

  node4:
    build: .
    container_name: raft-node4
    ports:
      - "50054:50054"
    environment:
      - NODE_ID=node4
      - PORT=50054
      - PEERS=node1:node1:50051,node2:node2:50052,node3:node3:50053,node5:node5:50055
    networks:
      - raft-network

  node5:
    build: .
    container_name: raft-node5
    ports:
      - "50055:50055"
    environment:
      - NODE_ID=node5
      - PORT=50055
      - PEERS=node1:node1:50051,node2:node2:50052,node3:node3:50053,node4:node4:50054
    networks:
      - raft-network

networks:
  raft-network:
    driver: bridge